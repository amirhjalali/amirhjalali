name: Latest blog posts
on:
  schedule:
    - cron: '15 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://amirhjalali.com/feed.xml"
          max_post_count: 5
          template: "- **[$title]($url)**$newline"
          tag_post_pre_newline: true
          item_exec: |
            const smallWords = new Set(['a', 'an', 'and', 'as', 'at', 'but', 'by', 'for', 'in', 'of', 'on', 'or', 'the', 'to', 'vs', 'with']);
            const words = post.title.toLowerCase().split(' ');
            post.title = words.map((word, index) => {
              const key = word.replace(/^[^a-z0-9]+|[^a-z0-9]+$/g, '');
              if (index > 0 && index < words.length - 1 && smallWords.has(key)) return word;
              return word.replace(/[a-z]/, char => char.toUpperCase());
            }).join(' ');
          commit_message: "Update blog posts in README"
          committer_username: "blog-post-bot"
          committer_email: "actions@github.com"
